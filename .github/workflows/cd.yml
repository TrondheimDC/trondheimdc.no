# CD Pipeline - Runs on push to main
name: CD - Build, Lint, Test, Deploy

on:
  push:
    branches: ["main"]

  # Allows manual trigger from Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "deploy"
  cancel-in-progress: false

env:
  DEPLOY_PATH: /var/www/sites/2026.trondheimdc.no/public

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: |
          gem install jekyll bundler
          if [ -f old/Gemfile ]; then cd old && bundle install; fi

      - name: Build Jekyll site
        working-directory: old
        run: jekyll build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: old/_site/
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: old/_site/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Lint HTML files
        run: htmlhint "old/_site/**/*.html" --config .htmlhintrc || true
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: old/_site/

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install html-proofer
        run: gem install html-proofer

      - name: Test HTML with html-proofer
        run: |
          htmlproofer old/_site \
            --disable-external \
            --ignore-urls "/^http:\/\/localhost/,/^http:\/\/127.0.0.1/" \
            --allow-hash-href \
            --ignore-empty-alt \
            --ignore-missing-alt \
            || true
        continue-on-error: true

  e2e-old:
    name: e2e (old site)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: old/_site/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: old/tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: old/tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: old/tests
        run: npm run test:ci
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-old
          path: old/tests/playwright-report/
          retention-days: 7

  e2e-new:
    name: e2e (new site)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install site dependencies
        working-directory: src
        run: bun install --frozen-lockfile

      - name: Build Eleventy site
        working-directory: src
        run: bun run build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        working-directory: src/tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: src/tests
        run: npm run test:ci
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-new
          path: src/tests/playwright-report/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    # Deploy gates on the OLD-site checks only — this workflow deploys the old
    # site to production, so a new-site test failure must not block it. The new
    # site is deployed separately via deploy-preview.yml.
    needs: [build, lint, test, e2e-old]
    environment:
      name: production
      url: https://trondheimdc.no
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: old/_site/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server via rsync
        run: |
          rsync -rlvz --delete \
            --exclude 'secret_new_duck_site/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            old/_site/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  summary:
    runs-on: ubuntu-latest
    needs: [build, lint, test, e2e-old, e2e-new, deploy]
    if: always()
    steps:
      - name: Create job summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '⚠️ Warnings' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 HTML Test | ${{ needs.test.result == 'success' && '✅ Passed' || '⚠️ Warnings' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 E2E (old site) | ${{ needs.e2e-old.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🦆 E2E (new site) | ${{ needs.e2e-new.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Deploy | ${{ needs.deploy.result == 'success' && '✅ Deployed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://trondheimdc.no" >> $GITHUB_STEP_SUMMARY
