# CD Pipeline - Runs on push to main.
# Builds the new Eleventy site (src/) and deploys it to the production root,
# replacing the old Jekyll site. Gated on the new-site Playwright e2e tests.
name: CD - Build, Test, Deploy

on:
  push:
    branches: ["main"]

  # Allows manual trigger from Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "deploy"
  cancel-in-progress: false

env:
  DEPLOY_PATH: /var/www/sites/2026.trondheimdc.no/public

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: src
        run: bun install --frozen-lockfile

      - name: Build Eleventy site
        working-directory: src
        run: bun run build
        # No ELEVENTY_PATH_PREFIX → pathPrefix defaults to "/", so the site is
        # served from the production root, replacing the old Jekyll site.
        env:
          SESSIONIZE_API_URL: ${{ secrets.SESSIONIZE_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: src/_site/
          retention-days: 1

  e2e-new:
    name: e2e (new site)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install site dependencies
        working-directory: src
        run: bun install --frozen-lockfile

      - name: Build Eleventy site
        working-directory: src
        run: bun run build
        env:
          SESSIONIZE_API_URL: ${{ secrets.SESSIONIZE_API_URL }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        working-directory: src/tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: src/tests
        run: npm run test:ci
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-new
          path: src/tests/playwright-report/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    # Gates on the new-site build + e2e, then deploys the Eleventy site to the
    # production root. The --delete below also clears the now-retired
    # /secret_new_duck_site/ preview folder from the server on the next deploy.
    needs: [build, e2e-new]
    environment:
      name: production
      url: https://trondheimdc.no
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: src/_site/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server via rsync
        run: |
          rsync -rlvz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            src/_site/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  summary:
    runs-on: ubuntu-latest
    needs: [build, e2e-new, deploy]
    if: always()
    steps:
      - name: Create job summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🦆 E2E (new site) | ${{ needs.e2e-new.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Deploy | ${{ needs.deploy.result == 'success' && '✅ Deployed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://trondheimdc.no" >> $GITHUB_STEP_SUMMARY
